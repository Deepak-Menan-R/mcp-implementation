<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      height: 100vh;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 95vh;
      background: #020617;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    header {
      padding: 16px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 16px;
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.4;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #1e293b;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
      font-size: 14px;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>

</head>

<body>

<div class="container">
  <header>AI Assistant</header>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Ask about weather, exchange rates, news..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const chatBox = document.getElementById("chatBox");

  function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // LOADING STATE
    addMessage("Typing...", "bot");

    try {
      // 🔥 Replace with your backend endpoint
      const response = await fetch("http://localhost:5000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await response.json();

      // Remove "Typing..."
      chatBox.removeChild(chatBox.lastChild);

      addMessage(data.response, "bot");

    } catch (error) {
      chatBox.removeChild(chatBox.lastChild);
      addMessage("Error connecting to server.", "bot");
    }
  }

  // Enter key support
  document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });
</script>

</body>
</html>
